services:
  # ── Backend (Node.js + Express) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommify-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      POSTGRES_URL: postgresql://postgres.smaliszofgizhffpnlha:gxMvAhLHoqeQHVzk@aws-1-us-west-2.pooler.supabase.com:6543/postgres
      POSTGRES_SSL: "true"
      MONGODB_URI: mongodb+srv://edissonsteven_db_user:xd2sOQc15k7eZ5jm@ecommify.xdwdeqf.mongodb.net/ecommify?appName=ecommify
      JWT_SECRET: ecommify_jwt_secret_docker_2024
      JWT_EXPIRES_IN: 24h
    ports:
      - "3000:3000"
    networks:
      - ecommify-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommify-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - ecommify-net

volumes:
  postgres_data:
  mongo_data:

networks:
  ecommify-net:
    driver: bridge
