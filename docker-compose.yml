services:
  # ── Backend (Node.js + Express) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommify-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      POSTGRES_URL: ${POSTGRES_URL}
      POSTGRES_SSL: ${POSTGRES_SSL}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "3000:3000"
    networks:
      - ecommify-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommify-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"
    networks:
      - ecommify-net

networks:
  ecommify-net:
    driver: bridge
